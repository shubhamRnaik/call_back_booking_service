<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 Indic Voice Bot - Live Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .status-box {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .status-indicator {
            font-size: 48px;
            margin-bottom: 12px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .status-detail {
            font-size: 13px;
            color: #666;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }
        
        .language-select {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            background: white;
            width: 100%;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        .transcript-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 16px;
            min-height: 60px;
            max-height: 150px;
            overflow-y: auto;
            border-left: 4px solid #667eea;
            margin-bottom: 20px;
        }
        
        .response-box {
            background: #f0f4ff;
            border-radius: 8px;
            padding: 16px;
            min-height: 60px;
            max-height: 150px;
            overflow-y: auto;
            border-left: 4px solid #764ba2;
            margin-bottom: 20px;
        }
        
        .metric {
            text-align: center;
        }
        
        .metric-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        .metric-value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        
        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius:32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-record {
            background: #667eea;
            color: white;
        }
        
        .btn-record:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-record:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .btn-record.recording {
            background: #e74c3c;
            animation: pulse 1s infinite;
        }
        
        .btn-stop {
            background: #95a5a6;
            color: white;
        }
        
        .btn-stop:hover:not(:disabled) {
            background: #7f8c8d;
        }
        
        .btn-stop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-clear {
            background: #ecf0f1;
            color: #333;
        }
        
        .btn-clear:hover:not(:disabled) {
            background: #bdc3c7;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .metrics {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }
        
        .error-box {
            background: #fee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
            display: none;
        }
        
        .error-box.show {
            display: block;
        }
        
        .error-text {
            color: #c0392b;
            font-size: 14px;
        }
        
        .transcript-empty, .response-empty {
            color: #999;
            font-style: italic;
            font-size: 14px;
        }
        
        .transcript-text, .response-text {
            color: #333;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .speaker-icon {
            display: inline-block;
            margin-right: 8px;
            font-weight: 600;
            color: #667eea;
        }
        div class="header">
            <h1>🎤 Indic Voice Bot</h1>
            <p class="subtitle">Speak and get intelligent responses in real-time</p>
        </div>
        
        <div class="status-box">
            <div class="status-indicator" id="statusIcon">🟢</div>
            <div class="status-text" id="statusText">READY</div>
            <div class="status-detail" id="statusDetail">Click "Start Recording" to begin</div>
        </div>
        
        <div class="error-box" id="errorBox">
            <div class="error-text" id="errorText"></div>
        </div>
        
        <div>
            <div class="section-title">Language</div>
            <select class="language-select" id="languageSelect">
                <option value="hi-IN">🇮🇳 Hindi (हिंदी)</option>
                <option value="ta-IN">🇮🇳 Tamil (தமிழ்)</option>
                <option value="te-IN">🇮🇳 Telugu (తెలుగు)</option>
                <option value="kn-IN">🇮🇳 Kannada (ಕನ್ನಡ)</option>
                <option value="mr-IN">🇮🇳 Marathi (मराठी)</option>
                <option value="ml-IN">🇮🇳 Malayalam (മലയാളം)</option>
            </select>
        </div>
        
        <div class="controls">
            <button class="btn-record" id="recordBtn" onclick="startRecording()">
                <span>🎙️</span>
                <span>Start Recording</span>
            </button>
            <button class="btn-stop" id="stopBtn" onclick="stopRecording()" disabled>
                <span>⏹️</span>
                <span>Stop</span>
            </button>
            <button class="btn-clear" id="clearBtn" onclick="clearTranscripts()">
                <span>🗑️</span>
                <span>Clear</span>
            </button>
        </div>
        
        <div class="metrics">
            <div class="metric">
                <div class="metric-label">STT Latency</div>
                <div class="metric-value" id="sttLatency">—</div>
            </div>
            <div class="metric">
                <div class="metric-label">Brain TTFT</div>
                <div class="metric-value" id="brainTTFT">—</div>
            </div>
            <div class="metric">
                <div class="metric-label">E2E TTFB</div>
                <div class="metric-value" id="e2eTTFB">—</div>
            </div>
        </div>
        
        <div class="transcript-section">
            <div class="section-title">👂 Your Speech</div>
            <div class="transcript-box">
                <div class="transcript-text" id="transcript">
                    <span class="transcript-empty">Waiting for input...</span>
                </div>
            </div>
        </div>
        
        <div class="transcript-section">
            <div class="section-title">🤖 Agent Response</div>
            <div class="response-box">
                <div class="response-text" id="response">
                    <span class="response-empty">Response will appear here...</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>🎤 Real-time voice bot powered by Sarvam AI & Gemini LLM</p>
            <p>STT (16kHz) → Brain → TTS (8kHz) with instant barge-in support</p>
        dioPlayer">
            <label>🎧 Audio Output</label>
            <audio id="audioOutput" controls autoplay></audio>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">TTFB</div>
                    <div class="stat-value" id="ttfbStat">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Chunks</div>
                    <div class="stat-value" id="chunksStat">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Size</div>
                    <div class="stat-value" id="sizeStat">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Duration</div>
                    <div class="stat-value" id="durationStat">-</div>
                </div>
            </div>
        </div>
        
        <div class="output" id="output"></div>
    </div>
    
    <script>
        // Global state
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let startTime;
        
        // Initialize
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });
                
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioContext = new AudioContext({ sampleRate: 16000 });
                
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    await processAudio();
                };
                
                updateStatus('READY', 'Ready to record', '🟢');
            } catch (error) {
                showError('Microphone access denied: ' + error.message);
                updateStatus('ERROR', 'Microphone not available', '❌');
            }
        }
        
        function startRecording() {
            if (!mediaRecorder) {
                showError('Microphone not initialized');
                return;
            }
            
            audioChunks = [];
            isRecording = true;
            startTime = Date.now();
            
            mediaRecorder.start();
            document.getElementById('recordBtn').disabled = true;
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('stopBtn').disabled = false;
            
            updateStatus('USER_SPEAKING', 'Listening...', '🗣️');
            clearTranscripts();
        }
        
        function stopRecording() {
            if (!mediaRecorder || !isRecording) return;
            
            mediaRecorder.stop();
            isRecording = false;
            
            document.getElementById('recordBtn').disabled = false;
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('stopBtn').disabled = true;
            
            updateStatus('THINKING', 'Processing speech...', '🧠');
        }
        
        async function processAudio() {
            try {
                // Create blob from audio chunks
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
                
                // Create FormData for multipart upload
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');
                
                const language = document.getElementById('languageSelect').value;
                formData.append('language_code', language);
                
                updateStatus('THINKING', 'Sending to STT...', '🧠');
                
                const response = await fetch('/api/voice/process', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const error = await response.json().catch(() => ({ detail: 'Processing failed' }));
                    throw new Error(error.detail || 'Processing failed');
                }
                
                const data = await response.json();
                
                // Update UI with results
                updateTranscript(data.transcript, data.language_code);
                updateResponse(data.response);
                updateMetrics(data.metrics);
                
                // Play audio response if available
                if (data.audio_base64) {
                    playAudioFromBase64(data.audio_base64);
                }
                
                updateStatus('READY', 'Ready for next input', '🟢');
                
            } catch (error) {
                showError('Error processing audio: ' + error.message);
                updateStatus('ERROR', 'Processing failed', '❌');
                document.getElementById('recordBtn').disabled = false;
                document.getElementById('recordBtn').classList.remove('recording');
            }
        }
        
        function playAudioFromBase64(base64Data) {
            try {
                // Decode base64 to binary
                const binaryString = atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                // Create blob and play
                const audioBlob = new Blob([bytes], { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                const audio = new Audio(audioUrl);
                audio.play().catch(err => {
                    console.log('Audio playback error:', err);
                    showError('Could not play audio response');
                });
            } catch (error) {
                console.error('Error playing audio:', error);
                showError('Error playing audio response: ' + error.message);
            }
        }
        
        function updateStatus(status, detail, icon) {
            document.getElementById('statusText').textContent = status;
            document.getElementById('statusDetail').textContent = detail;
            document.getElementById('statusIcon').textContent = icon;
        }
        
        function updateTranscript(text, language) {
            const transcriptDiv = document.getElementById('transcript');
            transcriptDiv.innerHTML = `<span class="speaker-icon">👤</span><span class="transcript-text">${escapeHtml(text)}</span><br><span style="font-size: 12px; color: #999;">(${language})</span>`;
        }
        
        function updateResponse(text) {
            const responseDiv = document.getElementById('response');
            responseDiv.innerHTML = `<span class="speaker-icon">🤖</span><span class="response-text">${escapeHtml(text)}</span>`;
        }
        
        function updateMetrics(metrics) {
            if (metrics) {
                if (metrics.stt_latency_ms) {
                    document.getElementById('sttLatency').textContent = metrics.stt_latency_ms.toFixed(0) + 'ms';
                }
                if (metrics.brain_ttft_ms) {
                    document.getElementById('brainTTFT').textContent = metrics.brain_ttft_ms.toFixed(0) + 'ms';
                }
                if (metrics.e2e_ttfb_ms) {
                    document.getElementById('e2eTTFB').textContent = metrics.e2e_ttfb_ms.toFixed(0) + 'ms';
                }
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function clearTranscripts() {
            document.getElementById('transcript').innerHTML = '<span class="transcript-empty">Waiting for input...</span>';
            document.getElementById('response').innerHTML = '<span class="response-empty">Response will appear here...</span>';
            document.getElementById('sttLatency').textContent = '—';
            document.getElementById('brainTTFT').textContent = '—';
            document.getElementById('e2eTTFB').textContent = '—';
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorBox.classList.add('show');
            setTimeout(() => {
                errorBox.classList.remove('show');
            }, 5000);
        }
        
        // Initialize on load
        window.addEventListener('load', initAudio);
    </script>
</body>
</html>
